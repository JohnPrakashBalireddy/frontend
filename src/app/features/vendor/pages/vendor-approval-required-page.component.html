<main class="screen pending-screen">
  <section class="card pending-card">
    <h2>Approval Required</h2>
    <p>Your vendor account is registered successfully, but it is waiting for admin approval.</p>
    <p>Once approved, you will be able to access demand feed and submit offers.</p>

    <div class="actions">
      <button class="primary-btn" type="button" (click)="goToDashboard()">Check Again</button>
      <button class="ghost-btn" type="button" (click)="signOut()">Sign Out</button>
    </div>
  </section>
</main>
